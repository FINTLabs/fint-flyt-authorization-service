apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: bym-oslo-kommune-no

resources:
  - ../../../base

labels:
  - pairs:
      app.kubernetes.io/instance: fint-flyt-authorization-service_bym-oslo-kommune-no
      fintlabs.no/org-id: bym.oslo.kommune.no

patches:
  - patch: |-
      - op: replace
        path: "/spec/kafka/acls/0/topic"
        value: "bym-oslo-kommune-no.flyt.*"
      - op: replace
        path: "/spec/orgId"
        value: "bym.oslo.kommune.no"
      - op: replace
        path: "/spec/ingress/basePath"
        value: "/bym-oslo-kommune-no/api/intern/authorization"
      - op: add
        path: "/spec/env/-"
        value:
          name: "novari.flyt.web-resource-server.security.api.internal.authorized-org-id-role-pairs-json"
          value: |
            {
              "bym.oslo.kommune.no":["USER"],
              "vigo.no":["DEVELOPER","USER"],
              "novari.no":["DEVELOPER","USER"]
            }
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.acos.available"
          value: "true"
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.isygraving.available"
          value: "true"
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.fskyss.available"
          value: "true"
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.acos.sso.client-id"
          valueFrom:
            secretKeyRef:
              name: fint-flyt-acos-oauth2-client
              key: fint.flyt.acos.sso.client-id
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.isygraving.sso.client-id"
          valueFrom:
            secretKeyRef:
              name: fint-flyt-isygraving-oauth2-client
              key: fint.flyt.isygraving.sso.client-id
      - op: add
        path: "/spec/env/-"
        value:
          name: "fint.flyt.fskyss.sso.client-id"
          valueFrom:
            secretKeyRef:
              name: fint-flyt-fskyss-oauth2-client
              key: fint.flyt.fskyss.sso.client-id

      - op: add
        path: "/spec/env/-"
        value:
         name: "novari.kafka.topic.orgId"
         value: "bym-oslo-kommune-no"
      - op: add
        path: "/spec/env/-"
        value:
         name: "server.servlet.context-path"
         value: "/bym-oslo-kommune-no"
      - op: replace
        path: "/spec/probes/startup/path"
        value: "/bym-oslo-kommune-no/actuator/health"
      - op: replace
        path: "/spec/probes/readiness/path"
        value: "/bym-oslo-kommune-no/actuator/health/readiness"
      - op: replace
        path: "/spec/probes/liveness/path"
        value: "/bym-oslo-kommune-no/actuator/health/liveness"
      - op: replace
        path: "/spec/observability/metrics/path"
        value: "/bym-oslo-kommune-no/actuator/prometheus"
    target:
      kind: Application
      name: fint-flyt-authorization-service
