fint:
  application-id: fint-flyt-authorization-service
novari:
  flyt:
    authorization:
      access-control:
        permitted-approles:
          flyt-user: "https://role-catalog.vigoiks.no/vigo/flyt/user"
          flyt-developer: "https://role-catalog.vigoiks.no/vigo/flyt/developer"
        sync-schedule:
          initial-delay: 1s
          fixed-delay: 12h
    web-resource-server:
      security:
        api:
          internal-client:
            authorized-client-ids: ${fint.flyt.authorization.sso.client-id:}

spring:
  profiles:
    include:
      - flyt-kafka
      - flyt-logging
      - flyt-postgres
      - flyt-web-resource-server
